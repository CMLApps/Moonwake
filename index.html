<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moonwake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: linear-gradient(180deg, #18102E 0%, #0A0614 100%);
      color: #ECE3FF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 12px;
      color: #C9A24A;
    }
    .tagline {
      color: #9A8AC0;
      font-size: 16px;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 320px;
      margin: 0 auto;
    }
    a {
      display: block;
      padding: 14px 20px;
      background: #221A3A;
      border: 1px solid #342A52;
      border-radius: 12px;
      color: #ECE3FF;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.15s ease;
    }
    a:hover {
      background: #2C2248;
      border-color: #C9A24A;
      color: #C9A24A;
    }
    .footer {
      margin-top: 40px;
      color: #6B5F8C;
      font-size: 12px;
    }
    .footer a {
      display: inline;
      padding: 0;
      background: none;
      border: none;
      color: #6B5F8C;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Moonwake</h1>
    <p class="tagline">Ask the cards. Read what the deck reveals.</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Use</a>
      <a href="eula.html">End User License Agreement</a>
    </div>
    <p class="footer">
      Cloud Motion Lab &middot; <a href="mailto:dev@slyapp.co">dev@slyapp.co</a>
    </p>
  </div>
</body>
</html>
